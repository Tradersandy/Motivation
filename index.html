<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motivation App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
      font-size: 22px;
    }

    .container {
      padding: 15px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .trading { background: #f59e0b; }
    .general { background: #22c55e; }
    .spiritual { background: #3b82f6; }

    #quoteBox {
  margin-top: 25px;
  padding: 20px;
  background: #1e293b;
  border-radius: 15px;
  font-size: 18px;
  line-height: 1.6;

  /* IMPORTANT CHANGES */
  min-height: 120px;
  height: auto;              /* auto expand */
  word-wrap: break-word;     /* long text wrap */
  overflow-wrap: break-word; /* mobile support */
}
    }

    .next-btn {
  margin-top: 20px;
  padding: 18px;            /* height वाढली */
  width: 100%;
  border-radius: 14px;
  border: none;
  background: #e11d48;
  color: white;

  font-size: 18px;          /* text मोठा */
  font-weight: bold;

  cursor: pointer;

  /* mobile click feel */
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
    }
  </style>
</head>

<body>

<h1>🔥 Motivation App</h1>

<div class="container">

  <button class="btn trading" onclick="setCategory('Trading')">
    📈 Trading Motivation
  </button>

  <button class="btn general" onclick="setCategory('General')">
    💪 General Motivation
  </button>

  <button class="btn spiritual" onclick="setCategory('Spiritual')">
    🧘 Spiritual Thoughts
  </button>

  <div id="quoteBox">
    Tap any button to get motivation 🚀
  </div>

  <button class="next-btn" onclick="getQuote()">
    🔁 Next Quote
  </button>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxPC4MKX2EohnSOZDo58uOPpoWEzLh_J_8l1IpRkPFf9PNDqvMVm0NqSmFsKREeWLgp/exec";

let currentCategory = "";

function setCategory(category) {
  currentCategory = category;
  getQuote();
}

function getQuote() {
  if (!currentCategory) {
    document.getElementById("quoteBox").innerText = "Please select category first!";
    return;
  }

  fetch(`${API_URL}?sheet=${currentCategory}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("quoteBox").innerText = data.quote;
    })
    .catch(err => {
      document.getElementById("quoteBox").innerText = "Error loading quote!";
      console.error(err);
    });
}
</script>

</body>
</html>
