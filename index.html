<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motivation App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* HOME SCREEN */
#home {
  padding: 20px;
}

.btn {
  width: 100%;
  padding: 18px;
  margin: 12px 0;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
}

.trading { background: orange; }
.general { background: green; }
.spiritual { background: blue; }

/* QUOTE SCREEN */
#quoteScreen {
  display: none;
  padding: 20px;
}

#quoteBox {
  margin-top: 40px;
  padding: 25px;
  background: #1e293b;
  border-radius: 15px;
  font-size: 20px;
  line-height: 1.6;
}

/* BUTTONS */
.next-btn {
  margin-top: 25px;
  padding: 18px;
  width: 100%;
  border-radius: 12px;
  border: none;
  background: #e11d48;
  color: white;
  font-size: 18px;
  font-weight: bold;
}

.back-btn {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: gray;
  color: white;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>🔥 ।। श्री स्वामी समर्थ ।।</h1>

  <button class="btn trading" onclick="start('Trading')">📈 Trading</button>
  <button class="btn general" onclick="start('General')">💪 General</button>
  <button class="btn spiritual" onclick="start('Spiritual')">🧘 Spiritual</button>
</div>

<!-- QUOTE SCREEN -->
<div id="quoteScreen">
  <h2 id="title"></h2>

  <div id="quoteBox">Loading...</div>

  <button class="next-btn" onclick="getQuote()">🔁 Next Quote</button>
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxPC4MKX2EohnSOZDo58uOPpoWEzLh_J_8l1IpRkPFf9PNDqvMVm0NqSmFsKREeWLgp/exec";

let currentCategory = "";

// start category
function start(category) {
  currentCategory = category;

  document.getElementById("home").style.display = "none";
  document.getElementById("quoteScreen").style.display = "block";
  document.getElementById("title").innerText = category;

  getQuote();
}

// fetch quote
function getQuote() {
  fetch(`${API_URL}?sheet=${currentCategory}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("quoteBox").innerText = data.quote;
    });
}

// back to home
function goBack() {
  document.getElementById("home").style.display = "block";
  document.getElementById("quoteScreen").style.display = "none";
}
</script>

</body>
</html>
